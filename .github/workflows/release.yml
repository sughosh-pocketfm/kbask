name: release

on:
  push:
    tags:
      - "v*"
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. 0.1.1 or v0.1.1). Required for manual runs."
        required: true

permissions:
  contents: write  # required to create the GitHub Release

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Resolve version from tag
        id: version
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          # Accept both "0.1.1" and "v0.1.1" tag styles.
          VERSION="${TAG#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "tag $TAG does not resolve to a PEP 440 version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Write version into source
        run: |
          set -euo pipefail
          export VERSION="${{ steps.version.outputs.version }}"
          python3 <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]
          py = pathlib.Path("pyproject.toml")
          py.write_text(
              re.sub(r'^version\s*=\s*".*"', f'version = "{version}"', py.read_text(), count=1, flags=re.M)
          )
          init = pathlib.Path("src/kbask/__init__.py")
          init.write_text(
              re.sub(r'__version__\s*=\s*".*"', f'__version__ = "{version}"', init.read_text(), count=1)
          )
          PY
          grep '^version' pyproject.toml
          grep '__version__' src/kbask/__init__.py

      - name: Build wheel and sdist
        run: uv build

      - name: List artifacts
        run: ls -la dist/

      - name: Smoke test wheel
        run: |
          set -euo pipefail
          uv venv .smoke
          source .smoke/bin/activate
          uv pip install dist/*.whl
          kbask --help
          kbask install --help || true

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 *.whl *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: kbask ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            install.sh
            tool-install.sh

      - name: Publish to PyPI
        if: ${{ env.PYPI_TOKEN != '' }}
        run: uv publish --token "${PYPI_TOKEN}"

      - name: Commit version bump back to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main:refs/remotes/origin/main
          git checkout -B main origin/main

          python3 <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]
          py = pathlib.Path("pyproject.toml")
          py.write_text(
              re.sub(r'^version\s*=\s*".*"', f'version = "{version}"', py.read_text(), count=1, flags=re.M)
          )
          init = pathlib.Path("src/kbask/__init__.py")
          init.write_text(
              re.sub(r'__version__\s*=\s*".*"', f'__version__ = "{version}"', init.read_text(), count=1)
          )
          PY

          if git diff --quiet -- pyproject.toml src/kbask/__init__.py; then
            echo "main already at version $VERSION; skipping commit."
            exit 0
          fi

          git add pyproject.toml src/kbask/__init__.py
          git commit -m "chore(release): bump version to $VERSION [skip ci]"
          git push origin HEAD:main
